<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paroles : Un Message Aux Marseillais</title>
    <!-- Le "../" permet de remonter d'un dossier pour aller chercher le style.css principal -->
    <link rel="stylesheet" href="../style.css">
</head>
<body>

    <header>
        <!-- Un bouton pour retourner facilement à l'accueil -->
        <a href="../index.html" class="back-btn">← Retour à l'accueil</a>
        <h1>Un Message Aux Marseillais</h1>
        <p class="subtitle"></p>
    </header>

    <main class="chant-container">
        

        <!-- Section Paroles (Lyrics) -->
        <section class="lyrics">
            <!-- On utilise <p> pour les strophes et <br> pour aller à la ligne sans faire de gros espace -->
            <p>
                Un message aux marseillais<br>
                Allez vous faire enculer<br>
                Nous sommes venus seulement chanter<br>
                PSG allez allez
            </p>
            
        </section>

        <!-- Section Bonus : Audio / Vidéo (Optionnel mais top) -->
        <section class="chant-media">
            <h3>Écouter le rythme :</h3>
            <!-- Exemple pour intégrer une vidéo YouTube proprement -->
            <div class="video-responsive">
                <iframe width="560" height="315" src="https://www.youtube.com/embed/2hmfDYgchSY" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
            </div>
        </section>

    </main>

    <footer>
        <p>© 2026 - Chants Parisiens - Ici c'est Paris !</p>
    </footer>

</body>
</html>
