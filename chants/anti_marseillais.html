<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paroles : Anti-Marseillais</title>
    <!-- Le "../" permet de remonter d'un dossier pour aller chercher le style.css principal -->
    <link rel="stylesheet" href="../style.css">
</head>
<body>

    <header>
        <!-- Un bouton pour retourner facilement à l'accueil -->
        <a href="../index.html" class="back-btn">← Retour à l'accueil</a>
        <h1>Anti-Marseillais</h1>
        <p class="subtitle"></p>
    </header>

    <main class="chant-container">
        
        <!-- Section Infos clés -->
        <section class="chant-info">
            <p><strong>Air original :</strong> <em>Santiago</em></p>
        </section>

        <!-- Section Paroles (Lyrics) -->
        <section class="lyrics">
            <!-- On utilise <p> pour les strophes et <br> pour aller à la ligne sans faire de gros espace -->
            <p>
                Anti-OM, anti-marseillais<br>
                Hissez haut<br>
                Bande de blaireaux
            </p>
            
            <p>
                À jamais je vous hairai<br>
                Et par les couilles je vous pendrai
            </p>

        </section>

        <!-- Section Bonus : Audio / Vidéo (Optionnel mais top) -->
        <section class="chant-media">
            <h3>Écouter le rythme :</h3>
            <!-- Exemple pour intégrer une vidéo YouTube proprement -->
            <div class="video-responsive">
                <iframe width="560" height="315" src="https://www.youtube.com/embed/Wwt3kPSs51w" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
            </div>
        </section>

    </main>

    <footer>
        <p>© 2026 - Chants Parisiens - Ici c'est Paris !</p>
    </footer>

</body>
</html>
